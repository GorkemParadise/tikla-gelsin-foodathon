<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ankara District-Based Platform Market Shares — Detailed Analysis v1</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ys: #E23B3B; --ty: #F5A623; --gy: #7B61FF; --tg: #00B4D8; --dg: #78909C;
    --bg-primary: #0a0a12;
    --bg-card: rgba(255,255,255,0.025);
    --border: rgba(255,255,255,0.06);
    --text-primary: #e8eaf0;
    --text-secondary: #8892a4;
    --text-muted: #4a5568;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg-primary);
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(226,59,59,0.06), transparent),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(123,97,255,0.04), transparent);
    min-height: 100vh; padding: 28px 16px; color: var(--text-primary);
  }
  .container { max-width: 1320px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 28px; }
  .header-badge {
    display: inline-block; font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 3px; color: var(--ty); text-transform: uppercase;
    background: rgba(245,166,35,0.08); padding: 5px 14px; border-radius: 20px;
    border: 1px solid rgba(245,166,35,0.15); margin-bottom: 12px;
  }
  h1 {
    font-size: 30px; font-weight: 800; margin-bottom: 6px;
    background: linear-gradient(135deg, #E23B3B 0%, #F5A623 40%, #7B61FF 70%, #00B4D8 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .subtitle { color: var(--text-secondary); font-size: 13px; }
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 10px; margin-bottom: 24px; }
  .kpi-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px; text-align: center; position: relative; overflow: hidden;
  }
  .kpi-label { font-size: 9.5px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 5px; }
  .kpi-value { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; }
  .kpi-sub { font-size: 10.5px; color: var(--text-muted); margin-top: 2px; }
  .tab-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
  .tab-btn {
    font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 500;
    padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
  }
  .tab-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--text-primary); }
  .tab-btn.active { background: rgba(255,255,255,0.08); color: #fff; border-color: rgba(255,255,255,0.2); }
  .legend { display: flex; justify-content: center; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  .legend-label { font-size: 11px; color: var(--text-secondary); }
  .table-container { background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    padding: 11px 9px; font-size: 10px; font-weight: 600; color: var(--text-secondary);
    letter-spacing: 0.7px; text-transform: uppercase; border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none; white-space: nowrap; transition: all 0.2s; text-align: center;
  }
  thead th:hover { color: #fff; }
  thead th.sorted { color: #fff; }
  th.col-ilce { text-align: left; padding-left: 14px; position: sticky; left: 0; background: #0d0d18; z-index: 3; min-width: 145px; }
  th.col-bar { cursor: default !important; min-width: 120px; }
  tbody tr { transition: background 0.12s; }
  tbody tr:nth-child(even) { background: rgba(255,255,255,0.012); }
  tbody tr:hover { background: rgba(255,255,255,0.04) !important; }
  tbody td {
    padding: 8px 9px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.03);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-secondary); transition: all 0.15s;
  }
  td.col-ilce {
    text-align: left; padding-left: 14px; position: sticky; left: 0; background: #0d0d18; z-index: 1;
    font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 12.5px; color: var(--text-primary);
  }
  tr:nth-child(even) td.col-ilce { background: #0e0e1a; }
  tr:hover td.col-ilce { background: #14142a !important; }
  .rank { display: inline-block; width: 22px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); }
  .cell-max { font-weight: 700; color: #fff !important; }
  .cell-zero { color: #2a2e3a !important; }
  .cell-toplam { font-weight: 600; color: var(--text-primary) !important; }
  .minibar { display: flex; height: 5px; border-radius: 3px; overflow: hidden; width: 100%; }
  .minibar > div { transition: width 0.4s ease; }
  .avg-row { background: rgba(255,255,255,0.045) !important; }
  .avg-row td { border-top: 2px solid rgba(255,255,255,0.1); padding: 11px 9px; font-weight: 700; }
  .avg-row td.col-ilce { background: #111126 !important; color: var(--ty); }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 10px; margin-top: 20px; }
  .stat-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
    padding: 13px 16px; border-left: 3px solid; transition: transform 0.2s, box-shadow 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .stat-card-label { font-size: 9.5px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .stat-card-value { font-size: 17px; font-weight: 700; color: #fff; }
  .stat-card-detail { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; margin-left: 6px; }
  .stat-card-sub { font-size: 10.5px; color: var(--text-muted); margin-top: 2px; }
  .footer { text-align: center; margin-top: 24px; font-size: 10.5px; color: var(--text-muted); font-style: italic; line-height: 1.7; }
  @keyframes fadeInUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .animate-in { animation: fadeInUp 0.5s ease forwards; }
  .d1 { animation-delay: 0.05s; opacity:0; }
  .d2 { animation-delay: 0.1s; opacity:0; }
  .d3 { animation-delay: 0.15s; opacity:0; }
</style>
</head>
<body>
<div class="container">
  <div class="header animate-in">
    <div class="header-badge">TAB Food · 2024–2025 Model · v1</div>
    <h1>Ankara District-Based Platform Market Shares</h1>
    <p class="subtitle">18 districts · 7 restaurant chains · Monthly estimated order data</p>
  </div>
  <div class="kpi-row animate-in d1" id="kpiRow"></div>
  <div class="tab-row animate-in d2">
    <button class="tab-btn active" onclick="setView('pct')">% Share View</button>
    <button class="tab-btn" onclick="setView('count')">Order Count View</button>
  </div>
  <div class="legend animate-in d2" id="legend"></div>
  <div class="table-container animate-in d3">
    <div class="table-scroll">
      <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
    </div>
  </div>
  <div class="stats-grid animate-in d3" id="stats"></div>
  <div class="footer animate-in d3" id="footer"></div>
</div>

<script>
// Ankara district data — estimation model v1 (March 2026)
// High-density urban districts with TAB Food restaurant presence
const data = [
  { ilce:"Çankaya",      toplam:52400, ys:24100, ty:15720, gy:8384,  tg:3144, dg:1052, ys_p:46.0, ty_p:30.0, gy_p:16.0, tg_p:6.0, dg_p:2.0 },
  { ilce:"Keçiören",     toplam:44800, ys:20608, ty:13888, gy:6272,  tg:2688, dg:1344, ys_p:46.0, ty_p:31.0, gy_p:14.0, tg_p:6.0, dg_p:3.0 },
  { ilce:"Yenimahalle",  toplam:41200, ys:18128, ty:13596, gy:6180,  tg:2884, dg:412,  ys_p:44.0, ty_p:33.0, gy_p:15.0, tg_p:7.0, dg_p:1.0 },
  { ilce:"Mamak",        toplam:36600, ys:17226, ty:10614, gy:5124,  tg:2928, dg:708,  ys_p:47.1, ty_p:29.0, gy_p:14.0, tg_p:8.0, dg_p:1.9 },
  { ilce:"Etimesgut",    toplam:34100, ys:14962, ty:11594, gy:5115,  tg:2047, dg:382,  ys_p:43.9, ty_p:34.0, gy_p:15.0, tg_p:6.0, dg_p:1.1 },
  { ilce:"Sincan",       toplam:30500, ys:13725, ty:9150,  gy:4575,  tg:2440, dg:610,  ys_p:45.0, ty_p:30.0, gy_p:15.0, tg_p:8.0, dg_p:2.0 },
  { ilce:"Altındağ",     toplam:28900, ys:13294, ty:8092,  gy:4046,  tg:2312, dg:1156, ys_p:46.0, ty_p:28.0, gy_p:14.0, tg_p:8.0, dg_p:4.0 },
  { ilce:"Pursaklar",    toplam:22400, ys:10304, ty:7392,  gy:2688,  tg:1568, dg:448,  ys_p:46.0, ty_p:33.0, gy_p:12.0, tg_p:7.0, dg_p:2.0 },
  { ilce:"Gölbaşı",      toplam:19800, ys:8910,  ty:6336,  gy:2772,  tg:1386, dg:396,  ys_p:45.0, ty_p:32.0, gy_p:14.0, tg_p:7.0, dg_p:2.0 },
  { ilce:"Polatlı",      toplam:18200, ys:8372,  ty:5824,  gy:2184,  tg:1274, dg:546,  ys_p:46.0, ty_p:32.0, gy_p:12.0, tg_p:7.0, dg_p:3.0 },
  { ilce:"Beypazarı",    toplam:14500, ys:6960,  ty:4350,  gy:1740,  tg:1160, dg:290,  ys_p:48.0, ty_p:30.0, gy_p:12.0, tg_p:8.0, dg_p:2.0 },
];

const platforms = [
  { key:"ys", pkey:"ys_p", label:"Yemeksepeti",  short:"YS",    color:"#E23B3B" },
  { key:"ty", pkey:"ty_p", label:"Trendyol Food", short:"TY",    color:"#F5A623" },
  { key:"gy", pkey:"gy_p", label:"Getir Food",    short:"Getir", color:"#7B61FF" },
  { key:"tg", pkey:"tg_p", label:"Tıkla Gelsin",  short:"Tıkla", color:"#00B4D8" },
  { key:"dg", pkey:"dg_p", label:"Other",          short:"Other", color:"#78909C" },
];

let sortKey = "toplam", sortDir = "desc", viewMode = "pct";

function fmt(n) { return n.toLocaleString("en-US"); }
function hexToRgb(h) { return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }
function heatBg(val, min, max, color) {
  if (val <= 0) return "transparent";
  const ratio = (val - min) / ((max - min) || 1);
  const alpha = 0.08 + ratio * 0.45;
  const [r,g,b] = hexToRgb(color);
  return `rgba(${r},${g},${b},${alpha})`;
}

const ranges = {};
platforms.forEach(p => {
  const pv = data.map(d => d[p.pkey]).filter(v => v > 0);
  const cv = data.map(d => d[p.key]).filter(v => v > 0);
  ranges[p.key] = { pmin:Math.min(...pv), pmax:Math.max(...pv), cmin:Math.min(...cv), cmax:Math.max(...cv) };
});

const total = data.reduce((s,d) => s+d.toplam, 0);
const tYS = data.reduce((s,d) => s+d.ys, 0);
const tTY = data.reduce((s,d) => s+d.ty, 0);
const tGY = data.reduce((s,d) => s+d.gy, 0);
const tTG = data.reduce((s,d) => s+d.tg, 0);
const avgYSp = (data.reduce((s,d) => s+d.ys_p, 0) / data.length).toFixed(1);

document.getElementById("kpiRow").innerHTML = [
  { l:"Total Monthly Orders", v:fmt(total),  s:"18 districts total",                                    c:"#fff" },
  { l:"Yemeksepeti",          v:fmt(tYS),    s:`${(tYS/total*100).toFixed(1)}% overall · avg ${avgYSp}%`, c:"var(--ys)" },
  { l:"Trendyol Food",        v:fmt(tTY),    s:`${(tTY/total*100).toFixed(1)}% overall share`,          c:"var(--ty)" },
  { l:"Getir Food",           v:fmt(tGY),    s:`${(tGY/total*100).toFixed(1)}% overall share`,          c:"var(--gy)" },
  { l:"Tıkla Gelsin",         v:fmt(tTG),    s:`${(tTG/total*100).toFixed(1)}% overall share`,          c:"var(--tg)" },
  { l:"Highest Volume",       v:"Çankaya",   s:"52,400 orders/month",                                   c:"#fff" },
].map(k => `<div class="kpi-card"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:${k.c}"></div>
  <div class="kpi-label">${k.l}</div><div class="kpi-value" style="color:${k.c}">${k.v}</div><div class="kpi-sub">${k.s}</div></div>`).join("");

document.getElementById("legend").innerHTML = platforms.map(p =>
  `<div class="legend-item"><div class="legend-dot" style="background:${p.color};box-shadow:0 0 6px ${p.color}33"></div><span class="legend-label">${p.label}</span></div>`
).join("");

let bestYS={p:0}, bestTY={p:0}, bestGY={p:0}, bestTG={p:0}, minYS={p:100}, closestGap={g:100};
data.forEach(d => {
  if (d.ys_p > bestYS.p) bestYS = {n:d.ilce, p:d.ys_p, c:fmt(d.ys)};
  if (d.ty_p > bestTY.p) bestTY = {n:d.ilce, p:d.ty_p, c:fmt(d.ty)};
  if (d.gy_p > bestGY.p) bestGY = {n:d.ilce, p:d.gy_p, c:fmt(d.gy)};
  if (d.tg_p > bestTG.p) bestTG = {n:d.ilce, p:d.tg_p, c:fmt(d.tg)};
  if (d.ys_p < minYS.p && d.ys_p > 0) minYS = {n:d.ilce, p:d.ys_p, c:fmt(d.ys)};
  const gap = d.ys_p - d.ty_p;
  if (gap > 0 && gap < closestGap.g) closestGap = {n:d.ilce, g:gap};
});

document.getElementById("stats").innerHTML = [
  { l:"Highest YS Share",          v:bestYS.n,       d:`${bestYS.p}%`,            c:"var(--ys)", s:`${bestYS.c} orders/month` },
  { l:"Highest TY Share",          v:bestTY.n,       d:`${bestTY.p}%`,            c:"var(--ty)", s:`${bestTY.c} orders/month` },
  { l:"Highest Getir Share",       v:bestGY.n,       d:`${bestGY.p}%`,            c:"var(--gy)", s:`${bestGY.c} orders/month` },
  { l:"Highest Tıkla Share",       v:bestTG.n,       d:`${bestTG.p}%`,            c:"var(--tg)", s:`${bestTG.c} orders/month` },
  { l:"Lowest YS Share",           v:minYS.n,        d:`${minYS.p}%`,             c:"var(--ys)", s:`${minYS.c} orders/month` },
  { l:"Most Competitive District", v:closestGap.n,   d:`gap: ${closestGap.g.toFixed(1)}%`, c:"#fff", s:"Smallest YS–TY gap" },
].map(c => `<div class="stat-card" style="border-left-color:${c.c}">
  <div class="stat-card-label">${c.l}</div>
  <div class="stat-card-value">${c.v}<span class="stat-card-detail" style="color:${c.c}">${c.d}</span></div>
  <div class="stat-card-sub">${c.s}</div></div>`).join("");

document.getElementById("footer").innerHTML = `
  * Ankara district data — estimation model v1 based on 2024–2025 TAB Food order patterns.<br>
  * Migros Food shares in applicable districts are included under "Other".<br>
  * Click column headers to sort · Use top tabs to switch view mode.
`;

function setView(m) {
  viewMode = m;
  document.querySelectorAll(".tab-btn").forEach((b, i) => b.classList.toggle("active", (i===0&&m==="pct")||(i===1&&m==="count")));
  render();
}
function doSort(k) {
  if (sortKey===k) sortDir = sortDir==="desc"?"asc":"desc";
  else { sortKey=k; sortDir="desc"; }
  render();
}
function minibar(r) {
  return `<div class="minibar">${platforms.map(p=>`<div style="width:${r[p.pkey]}%;background:${p.color}"></div>`).join("")}</div>`;
}

function render() {
  const sorted = [...data].sort((a,b) => {
    let va=a[sortKey], vb=b[sortKey];
    if (sortKey==="ilce") return sortDir==="desc"?vb.localeCompare(va,"tr"):va.localeCompare(vb,"tr");
    return sortDir==="desc"?vb-va:va-vb;
  });
  const isPct = viewMode==="pct";

  let th = `<tr><th class="col-ilce ${sortKey==='ilce'?'sorted':''}" onclick="doSort('ilce')"># DISTRICT ${sortKey==='ilce'?(sortDir==='desc'?'▼':'▲'):''}</th>
    <th class="col-bar">DISTRIBUTION</th>
    <th class="${sortKey==='toplam'?'sorted':''}" onclick="doSort('toplam')" style="${sortKey==='toplam'?'color:#fff':''}">TOTAL ${sortKey==='toplam'?(sortDir==='desc'?'▼':'▲'):''}</th>`;
  platforms.forEach(p => {
    const sk = isPct?p.pkey:p.key, is = sortKey===sk;
    th += `<th class="${is?'sorted':''}" onclick="doSort('${sk}')" style="color:${is?p.color:''};${is?`border-bottom:2px solid ${p.color}`:''}"> ${p.short} ${is?(sortDir==='desc'?'▼':'▲'):''}</th>`;
  });
  th += `</tr>`;
  document.getElementById("thead").innerHTML = th;

  let html = "";
  sorted.forEach((row, i) => {
    const maxP = Math.max(row.ys_p, row.ty_p, row.gy_p, row.tg_p);
    const maxC = Math.max(row.ys, row.ty, row.gy, row.tg);

    html += `<tr><td class="col-ilce"><span class="rank">${i+1}</span>${row.ilce}</td>
      <td style="padding:8px 7px">${minibar(row)}</td>
      <td class="cell-toplam">${fmt(row.toplam)}</td>`;
    platforms.forEach(p => {
      if (isPct) {
        const v=row[p.pkey], r=ranges[p.key], isM=v===maxP&&v>0;
        html += `<td class="${isM?'cell-max':''} ${v===0?'cell-zero':''}" style="background:${heatBg(v,r.pmin,r.pmax,p.color)}">${v>0?v+'%':'—'}</td>`;
      } else {
        const v=row[p.key], r=ranges[p.key], isM=v===maxC&&v>0;
        html += `<td class="${isM?'cell-max':''} ${v===0?'cell-zero':''}" style="background:${heatBg(v,r.cmin,r.cmax,p.color)}">${v>0?fmt(v):'—'}</td>`;
      }
    });
    html += `</tr>`;
  });

  const n = data.length, avgT = Math.round(total/n);
  html += `<tr class="avg-row"><td class="col-ilce" style="background:#111126!important;color:var(--ty)"><span class="rank">⌀</span>AVERAGE</td>
    <td style="padding:11px 7px">${minibar({ys_p:+(tYS/total*100).toFixed(1), ty_p:+(tTY/total*100).toFixed(1), gy_p:+(tGY/total*100).toFixed(1), tg_p:+(tTG/total*100).toFixed(1), dg_p:+(data.reduce((s,d)=>s+d.dg,0)/total*100).toFixed(1)})}</td>
    <td style="font-weight:700;color:#fff">${fmt(avgT)}</td>`;
  platforms.forEach(p => {
    if (isPct) { html += `<td style="color:${p.color};font-weight:700">${(data.reduce((s,d)=>s+d[p.pkey],0)/n).toFixed(1)}%</td>`; }
    else { html += `<td style="color:${p.color};font-weight:700">${fmt(Math.round(data.reduce((s,d)=>s+d[p.key],0)/n))}</td>`; }
  });
  html += `</tr>`;
  document.getElementById("tbody").innerHTML = html;
}
render();
</script>
</body>
</html>
